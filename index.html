<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>머니로그</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<div id="loginBox" class="login-box">
  <div class="login-card">
    <h1>머니로그</h1>
    <p>Google 계정으로 로그인하면<br>모든 기기에서 자동 동기화됩니다.</p>
    <button id="loginBtn" class="login-btn">Google 로그인</button>
  </div>
</div>

<div id="app" class="app hidden">

  <header class="top-header">
    <div class="user-info">
      <div id="userEmail" class="user-email"></div>
      <div id="syncStatus" class="sync-status">동기화 준비 중...</div>
    </div>

    <div class="header-actions">
      <button id="themeBtn" class="icon-btn">🌙</button>
      <button id="logoutBtn" class="logout-btn">로그아웃</button>
    </div>
  </header>

  <section class="month-bar">
    <button id="prevMonth" class="circle-btn">‹</button>
    <div id="monthLabel" class="month-label">2026년 6월</div>
    <button id="nextMonth" class="circle-btn">›</button>
  </section>

  <main>
    <section id="expenseScreen" class="screen active">
      <div class="page-title">지출</div>
      <div id="expenseTotal" class="big-money">0원</div>
      <div id="expenseList" class="card"></div>
    </section>

    <section id="incomeScreen" class="screen">
      <div class="page-title">수입</div>
      <div id="incomeTotal" class="big-money">0원</div>
      <div id="incomeList" class="card"></div>
    </section>

    <section id="estateScreen" class="screen">
      <div class="page-title">부동산</div>
      <div id="estateTotal" class="big-money">0원</div>

      <div class="card">
        <button id="rentBtn" class="rent-btn">이번 달 월세 자동 생성</button>
      </div>

      <div id="estateList" class="card"></div>
    </section>

    <section id="calendarScreen" class="screen">
      <div class="page-title">달력</div>

      <div class="card">
        <div id="calendarGrid"></div>
      </div>

      <div class="card">
        <div id="selectedDateTitle" class="card-title">날짜를 선택하세요</div>
        <div id="selectedDateList"></div>
      </div>
    </section>

    <section id="statsScreen" class="screen">
      <div class="page-title">통계</div>

      <div class="card">
        <div class="stat-row"><span>지출</span><strong id="statExpense">0원</strong></div>
        <div class="stat-row"><span>수입</span><strong id="statIncome">0원</strong></div>
        <div class="stat-row"><span>부동산</span><strong id="statEstate">0원</strong></div>
        <div class="stat-row"><span>남은 금액</span><strong id="statRemain">0원</strong></div>
      </div>

      <div id="categoryStats" class="card"></div>
    </section>
  </main>
</div>

<button id="addBtn" class="fab hidden">+</button>

<nav id="bottomNav" class="bottom-nav hidden">
  <button class="tab-btn active" data-tab="expense"><span>💸</span><em>지출</em></button>
  <button class="tab-btn" data-tab="income"><span>💰</span><em>수입</em></button>
  <button class="tab-btn" data-tab="estate"><span>🏢</span><em>부동산</em></button>
  <button class="tab-btn" data-tab="calendar"><span>📅</span><em>달력</em></button>
  <button class="tab-btn" data-tab="stats"><span>📊</span><em>통계</em></button>
</nav>

<div id="entryOverlay" class="entry-overlay hidden"></div>

<div id="entrySheet" class="entry-sheet hidden">
  <div class="sheet-handle"></div>

  <div class="entry-head">
    <h3 id="entryTitle">지출 입력</h3>
    <button id="entryCloseBtn" class="entry-close">×</button>
  </div>

  <div class="amount-wrap">
    <span>₩</span>
    <input id="entryAmount" class="amount-input" type="number" placeholder="0" inputmode="numeric" />
  </div>

  <div id="entryCategories" class="category-grid"></div>

  <label class="field-label">날짜</label>
  <input id="entryDate" class="soft-input" type="date" />

  <label class="field-label">메모</label>
  <input id="entryMemo" class="soft-input" type="text" placeholder="예: 점심 순대국" />

  <button id="entrySaveBtn" class="entry-save">기록 저장하기</button>
</div>

<div id="actionOverlay" class="entry-overlay hidden"></div>

<div id="actionSheet" class="action-sheet hidden">
  <div class="sheet-handle"></div>
  <div id="actionTitle" class="action-title">기록 관리</div>

  <button id="actionEditBtn" class="action-btn">수정</button>
  <button id="actionDeleteBtn" class="action-btn danger-btn">삭제</button>
  <button id="actionCancelBtn" class="action-btn">취소</button>
</div>


<script type="module" src="firebase.js"></script>
<script type="module" src="calendar.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
