<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase 테스트</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
  padding: 30px;
  background: #f4f6fb;
}
button {
  width: 100%;
  padding: 18px;
  border: 0;
  border-radius: 18px;
  background: #111827;
  color: white;
  font-size: 18px;
  font-weight: 900;
}
.card {
  margin-top: 20px;
  background: white;
  padding: 20px;
  border-radius: 24px;
}
</style>
</head>
<body>

<h1>머니로그 Firebase 테스트</h1>
<button id="loginBtn">Google 로그인</button>

<div class="card">
  <div id="status">로그인 전</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSVIFQy4izTG62HelbHNGh7MaV_gpdNHM",
  authDomain: "money-log-f1bfc.firebaseapp.com",
  projectId: "money-log-f1bfc",
  storageBucket: "money-log-f1bfc.firebasestorage.app",
  messagingSenderId: "212358025563",
  appId: "1:212358025563:web:e03df1f2d75a58f4144a7e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    document.getElementById("status").innerText = "로그인 실패: " + err.message;
  }
};

onAuthStateChanged(auth, async user => {
  if (!user) {
    document.getElementById("status").innerText = "로그인 전";
    return;
  }

  document.getElementById("status").innerText =
    "로그인 성공: " + user.email + "\nFirestore 저장 테스트 중...";

  const ref = doc(db, "users", user.uid, "test", "connection");

  await setDoc(ref, {
    message: "Firebase 연결 성공",
    email: user.email,
    time: new Date().toISOString()
  });

  const snap = await getDoc(ref);

  document.getElementById("status").innerText =
    "로그인 성공: " + user.email + "\nFirestore 저장 성공\n" + JSON.stringify(snap.data(), null, 2);
});
</script>

</body>
</html>
